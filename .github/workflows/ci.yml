name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Restore
        run: dotnet restore UdtLib.slnx

      - name: Build
        run: dotnet build UdtLib.slnx -c Release --no-restore

      - name: Run unit tests
        run: dotnet test UdtLib.Tests/UdtLib.Tests.csproj -c Release --no-build --logger "trx;LogFileName=unit-tests.trx" --results-directory TestResults

      - name: Run integration tests
        run: dotnet test UdtLib.IntegrationTests/UdtLib.IntegrationTests.csproj -c Release --no-build --logger "trx;LogFileName=integration-tests.trx" --results-directory TestResults

      - name: Publish unit test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests
          path: TestResults/unit-tests.trx
          reporter: dotnet-trx

      - name: Publish integration test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Tests
          path: TestResults/integration-tests.trx
          reporter: dotnet-trx

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/
          retention-days: 30

      - name: Upload NuGet packages
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            UdtLib/bin/Release/*.nupkg
            UdtLib/bin/Release/*.snupkg
          retention-days: 30

  publish-nuget:
    name: Publish nuget packages
    permissions:
      id-token: write  # enable GitHub OIDC token issuance for this job
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: packages

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: |
          dotnet nuget push "packages/*.nupkg" --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push "packages/*.snupkg" --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate
